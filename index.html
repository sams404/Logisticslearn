<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>LogiCore Pro — Freight & Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0a0a;overflow:hidden;font-family:'JetBrains Mono',monospace}

/* ── SWITCHER BAR ── */
#switcher{
  display:flex;align-items:center;
  height:46px;
  background:#0d0d0d;
  border-bottom:1px solid #1e1e1e;
  padding:0 6px;
  flex-shrink:0;
  position:relative;
  z-index:100;
  padding-top:env(safe-area-inset-top,0px);
}
.sw-logo{
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:#333;padding:0 10px;white-space:nowrap;
  display:none;
}
@media(min-width:400px){.sw-logo{display:block}}

.sw-tabs{display:flex;flex:1;gap:4px;justify-content:center}
.sw-tab{
  flex:1;max-width:200px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 12px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  color:#444;
  background:none;
  border:1px solid #1a1a1a;
  border-radius:3px;
  cursor:pointer;
  transition:all .15s;
  text-transform:uppercase;
  min-height:34px;
}
.sw-tab:hover{color:#777;border-color:#2a2a2a}
.sw-tab.active-freight{
  color:#60a5fa;
  border-color:#2563eb;
  background:rgba(37,99,235,0.08);
}
.sw-tab.active-learn{
  color:#c9a96e;
  border-color:#c9a96e;
  background:rgba(201,169,110,0.08);
}
.sw-dot{
  width:5px;height:5px;border-radius:50%;
  background:currentColor;opacity:0.6;
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:.6}50%{opacity:.15}}

/* ── FRAME CONTAINER ── */
#frames{flex:1;position:relative;overflow:hidden}
.frame-wrap{
  position:absolute;inset:0;
  display:none;
}
.frame-wrap.active{display:block}
iframe{
  width:100%;height:100%;
  border:none;display:block;
}

/* ── APP LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%}

/* ── LOADING OVERLAY ── */
.frame-loader{
  position:absolute;inset:0;
  background:#0a0a0a;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  pointer-events:none;
  transition:opacity .3s;
}
.frame-loader.hidden{opacity:0}
.loader-spinner{
  width:22px;height:22px;
  border:2px solid #1e1e1e;
  border-top-color:#60a5fa;
  border-radius:50%;
  animation:spin .6s linear infinite;
}
.loader-spinner.gold{border-top-color:#c9a96e}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{
  font-size:10px;letter-spacing:3px;color:#333;
}
</style>
</head>
<body>
<div id="app">

  <!-- SWITCHER -->
  <div id="switcher">
    <div class="sw-logo">LOGICORE<span style="color:#1e1e1e">·</span>PRO</div>
    <div class="sw-tabs">
      <button class="sw-tab active-freight" id="tab-freight" onclick="switchTo('freight')">
        <span class="sw-dot"></span>
        ⚡ FREIGHT AI
      </button>
      <button class="sw-tab" id="tab-learn" onclick="switchTo('learn')">
        <span class="sw-dot" style="opacity:0.15"></span>
        📚 LOGILEARN
      </button>
    </div>
  </div>

  <!-- FRAMES -->
  <div id="frames">

    <!-- GlobalFreight AI -->
    <div class="frame-wrap active" id="wrap-freight">
      <div class="frame-loader" id="loader-freight">
        <div class="loader-spinner"></div>
        <div class="loader-txt">LOADING FREIGHT AI</div>
      </div>
      <iframe id="frame-freight" src="freight.html" onload="frameLoaded('freight')"></iframe>
    </div>

    <!-- LogisticsLearn -->
    <div class="frame-wrap" id="wrap-learn">
      <div class="frame-loader" id="loader-learn">
        <div class="loader-spinner gold"></div>
        <div class="loader-txt">LOADING LOGILEARN</div>
      </div>
      <iframe id="frame-learn" src="learn.html" onload="frameLoaded('learn')"></iframe>
    </div>

  </div>
</div>

<script>
let current = 'freight';
const loaded = {freight:false, learn:false};

function switchTo(app) {
  if (current === app) return;
  current = app;

  // Update frame visibility
  document.getElementById('wrap-freight').classList.toggle('active', app === 'freight');
  document.getElementById('wrap-learn').classList.toggle('active', app === 'learn');

  // Update tab styles
  const tf = document.getElementById('tab-freight');
  const tl = document.getElementById('tab-learn');
  tf.className = 'sw-tab' + (app === 'freight' ? ' active-freight' : '');
  tl.className = 'sw-tab' + (app === 'learn' ? ' active-learn' : '');

  // Update dots
  tf.querySelector('.sw-dot').style.opacity = app === 'freight' ? '0.6' : '0.15';
  tl.querySelector('.sw-dot').style.opacity = app === 'learn' ? '0.6' : '0.15';
}

function frameLoaded(app) {
  loaded[app] = true;
  const loader = document.getElementById('loader-' + app);
  if (loader) {
    loader.classList.add('hidden');
    setTimeout(() => loader.style.display = 'none', 350);
  }
}
</script>
</body>
</html>
